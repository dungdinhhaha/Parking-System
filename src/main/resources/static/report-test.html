<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Test</title>
    <style>
        :root { --bg:#f5f7fb; --card:#fff; --text:#102033; --muted:#5e6b7a; --primary:#1d4ed8; --border:#d9e2ec; --danger:#b91c1c; --ok:#047857; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:Arial, Helvetica, sans-serif; background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 45%,#eef2f7 100%); color:var(--text); }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 28px 18px 48px; }
        .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
        .links a { margin-right:12px; color:#1d4ed8; text-decoration:none; font-weight:700; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; margin-top:18px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(16,32,51,.06); }
        label { display:block; font-size:13px; font-weight:700; margin:10px 0 6px; }
        input, select, button { width:100%; border:1px solid var(--border); border-radius:10px; padding:11px 12px; font-size:14px; }
        button { background:var(--primary); color:#fff; border:0; font-weight:700; cursor:pointer; margin-top:10px; }
        button.secondary { background:#475569; }
        .result { white-space:pre-wrap; background:#0f172a; color:#e2e8f0; min-height:200px; border-radius:12px; padding:12px; overflow:auto; }
        .small { font-size:13px; color:var(--muted); }
        .status { font-weight:700; color:var(--ok); }
        .inline { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1 style="margin:0 0 8px;">Report Test</h1>
            <div class="links">
                <a href="/test-hub.html">Hub</a>
                <a href="/payment-test.html">Payment</a>
                <a href="/incident-test.html">Incident</a>
            </div>
        </div>
        <div class="small">Use MANAGER / SYSTEM_ADMIN.</div>
    </div>
    <div class="grid">
        <div class="card">
            <h2>Auth</h2>
            <label>Username</label><input id="authUsername" value="manager">
            <label>Password</label><input id="authPassword" type="password" value="manager123">
            <button onclick="login()">Login</button>
            <button class="secondary" onclick="me()">/me</button>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <h2>Result</h2>
            <div id="status" class="status">Ready</div>
            <pre id="result" class="result"></pre>
        </div>

        <div class="card">
            <h2>Time Range</h2>
            <div class="inline">
                <div><label>From</label><input id="from" type="datetime-local"></div>
                <div><label>To</label><input id="to" type="datetime-local"></div>
            </div>
            <button onclick="setDefaultRange()">Set Default Range</button>
            <button onclick="dashboard()">Dashboard</button>
            <button class="secondary" onclick="revenue()">Revenue</button>
            <button class="secondary" onclick="incidents()">Incidents</button>
            <button class="secondary" onclick="occupancy()">Occupancy</button>
        </div>
    </div>
</div>

<script src="/test-common.js"></script>
<script>
    const TC = window.ParkingTestCommon;
    TC.bindOutput('result', 'status');

    async function login() { try { TC.setOutput(await TC.login('authUsername', 'authPassword')); } catch (e) { TC.setOutput(e.message, false); } }
    async function me() { try { TC.setOutput(await TC.me()); } catch (e) { TC.setOutput(e.message, false); } }
    async function logout() { try { await TC.logout(); } catch (e) { TC.setOutput(e.message, false); } }

    function setDefaultRange() {
        TC.setRelativeDateTime('to', 0);
        const toValue = document.getElementById('to').value;
        if (toValue) {
            const toDate = new Date(toValue);
            toDate.setDate(toDate.getDate() - 30);
            document.getElementById('from').value = TC.toLocalInputValue(toDate);
        }
    }

    function query() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const params = new URLSearchParams();
        if (from) params.set('from', from);
        if (to) params.set('to', to);
        const qs = params.toString();
        return qs ? `?${qs}` : '';
    }

    async function dashboard() { try { TC.setOutput(await TC.request(`/api/reports/dashboard${query()}`)); } catch (e) { TC.setOutput(e.message, false); } }
    async function revenue() { try { TC.setOutput(await TC.request(`/api/reports/revenue${query()}`)); } catch (e) { TC.setOutput(e.message, false); } }
    async function incidents() { try { TC.setOutput(await TC.request(`/api/reports/incidents${query()}`)); } catch (e) { TC.setOutput(e.message, false); } }
    async function occupancy() { try { TC.setOutput(await TC.request('/api/reports/occupancy')); } catch (e) { TC.setOutput(e.message, false); } }

    setDefaultRange();
</script>
</body>
</html>
